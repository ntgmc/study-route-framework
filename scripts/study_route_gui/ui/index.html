<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Study Route 管理台</title>
  <link rel="stylesheet" href="/static/app.css">
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-mark">SR</div>
        <div>
          <h1>Study Route</h1>
          <p>本地学习路线管理</p>
        </div>
      </div>
      <nav id="nav" class="nav" aria-label="分类"></nav>
    </aside>

    <main class="main">
      <header class="topbar">
        <div>
          <h2 id="pageTitle">总览</h2>
          <p id="pageMeta">加载中</p>
        </div>
        <div class="top-actions">
          <input id="globalSearch" type="search" placeholder="全局搜索">
          <button id="aiBtn" class="button" type="button">AI 生成</button>
          <button id="newBtn" class="button primary" type="button">新建</button>
        </div>
      </header>

      <section id="dashboardView" class="dashboard-view">
        <div id="stats" class="stats"></div>
        <section class="panel focus-panel">
          <div class="panel-head">
            <h3>当前焦点</h3>
            <button id="saveFocusBtn" class="button primary" type="button">保存焦点</button>
          </div>
          <div class="focus-grid">
            <label>主目标<textarea id="focusMainGoal"></textarea></label>
            <label>当前阶段<input id="focusStage" type="text"></label>
            <label>本周重点<input id="focusWeek" type="text"></label>
            <label>今日任务<input id="focusToday" type="text"></label>
          </div>
        </section>
        <section class="panel quick-log">
          <div class="panel-head">
            <h3>追加今日日志</h3>
            <button id="appendLogBtn" class="button primary" type="button">追加</button>
          </div>
          <div class="log-grid">
            <label>日期<input id="logDate" type="date"></label>
            <label>任务<input id="logTask" type="text"></label>
            <label>结果<input id="logResult" type="text"></label>
            <label>用时<input id="logHours" type="text"></label>
            <label>证据或产出<input id="logEvidence" type="text"></label>
            <label>关键收获<input id="logTakeaway" type="text"></label>
            <label>明日计划<input id="logNext" type="text"></label>
          </div>
        </section>
        <section class="panel">
          <div class="panel-head"><h3>最近更新</h3></div>
          <div id="recentFiles" class="recent-list"></div>
        </section>
      </section>

      <section id="managerView" class="manager-view">
        <aside class="file-pane">
          <div class="file-tools">
            <input id="fileSearch" type="search" placeholder="筛选当前分类">
            <select id="sortSelect">
              <option value="updated">按更新时间</option>
              <option value="name">按文件名</option>
            </select>
          </div>
          <div id="fileList" class="file-list"></div>
        </aside>
        <section class="editor-pane">
          <div class="editor-toolbar">
            <div id="currentPath" class="current-path">未选择文件</div>
            <div class="editor-actions">
              <button id="previewBtn" class="button" type="button">预览</button>
              <button id="renameBtn" class="button" type="button" disabled>重命名</button>
              <button id="archiveBtn" class="button danger" type="button" disabled>归档</button>
              <button id="saveBtn" class="button primary" type="button" disabled>保存</button>
            </div>
          </div>
          <div class="editor-body">
            <textarea id="editor" spellcheck="false" placeholder="选择左侧文件开始编辑"></textarea>
            <article id="preview" class="preview"></article>
          </div>
          <div id="status" class="status">就绪</div>
        </section>
      </section>

      <section id="searchView" class="search-view">
        <div class="panel">
          <div class="panel-head"><h3>搜索结果</h3></div>
          <div id="searchResults" class="recent-list"></div>
        </div>
      </section>
    </main>
  </div>

  <dialog id="createDialog">
    <form method="dialog" class="dialog-card">
      <h3>新建 Markdown</h3>
      <label>分类<select id="createSection"></select></label>
      <label>标题<input id="createTitle" type="text" placeholder="例如：2026-W26 学习计划"></label>
      <label>文件名<input id="createName" type="text" placeholder="例如：2026-W26.md"></label>
      <div class="dialog-actions">
        <button class="button" value="cancel">取消</button>
        <button id="createSubmit" class="button primary" value="default">创建</button>
      </div>
    </form>
  </dialog>

  <dialog id="renameDialog">
    <form method="dialog" class="dialog-card">
      <h3>重命名文件</h3>
      <label>新文件名<input id="renameName" type="text"></label>
      <div class="dialog-actions">
        <button class="button" value="cancel">取消</button>
        <button id="renameSubmit" class="button primary" value="default">保存</button>
      </div>
    </form>
  </dialog>

  <dialog id="aiDialog">
    <form method="dialog" class="dialog-card ai-dialog">
      <div class="dialog-title-row">
        <h3>DeepSeek 生成</h3>
        <span id="aiStatus" class="badge muted">检测中</span>
      </div>
      <label>生成类型
        <select id="aiMode">
          <option value="doc">完整文档</option>
          <option value="plan">学习计划</option>
          <option value="log">学习日志</option>
          <option value="review">复盘总结</option>
          <option value="tasks">任务拆解</option>
          <option value="polish">润色当前文档</option>
        </select>
      </label>
      <label>生成要求
        <textarea id="aiPrompt" rows="5" placeholder="例如：基于当前期末复习计划，生成明天 3 小时的详细任务安排"></textarea>
      </label>
      <label class="check-row">
        <input id="aiUseContext" type="checkbox" checked>
        <span>带入当前编辑器内容作为上下文</span>
      </label>
      <label>生成结果
        <textarea id="aiResult" rows="10" placeholder="生成结果会显示在这里"></textarea>
      </label>
      <div class="dialog-actions">
        <button class="button" value="cancel">关闭</button>
        <button id="aiGenerateSubmit" class="button primary" type="button">生成</button>
        <button id="aiInsertBtn" class="button" type="button" disabled>插入编辑器</button>
        <button id="aiReplaceBtn" class="button danger" type="button" disabled>替换编辑器</button>
      </div>
    </form>
  </dialog>

  <script src="/static/app.js"></script>
</body>
</html>
